name: NuGet Publish

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*' # Runs when you push a tag like v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Setup .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Step 3: Restore dependencies
      - name: Restore dependencies
        run: dotnet restore Kei.Base/Kei.Base.sln

      # Step 4: Build solution (all 4 projects)
      - name: Build solution
        run: dotnet build Kei.Base/Kei.Base.sln --configuration Release --no-restore

      # Step 5: Copy sibling project DLLs into Kei.Base output dir for obfuscation
      - name: Copy dependencies for obfuscation
        run: |
          cp Kei.Base.Domain/bin/Release/net8.0/Kei.Base.Domain.dll        Kei.Base/bin/Release/net8.0/
          cp Kei.Base.Extensions/bin/Release/net8.0/Kei.Base.Extensions.dll Kei.Base/bin/Release/net8.0/
          cp Kei.Base.Helper/bin/Release/net8.0/Kei.Base.Helper.dll         Kei.Base/bin/Release/net8.0/

      # Step 6: Install Obfuscar — a .NET 8-native obfuscator (no Mono required)
      #   ConfuserEx v1.6.0 on Mono cannot handle .NET 8 assemblies or EF Core 9.x.
      #   Obfuscar runs directly via 'dotnet tool' and resolves all dependencies natively.
      - name: Install Obfuscar
        run: dotnet tool install --global Obfuscar.GlobalTool

      # Step 7: Create output directory and obfuscate assemblies
      - name: Obfuscate assemblies
        run: |
          mkdir -p confused

          # Generate obfuscator.xml in-place so no extra file needs to be committed
          INPATH="$(pwd)/Kei.Base/bin/Release/net8.0"
          OUTPATH="$(pwd)/confused"

          cat > obfuscator.xml <<EOF
          <?xml version='1.0'?>
          <Obfuscator>
            <Var name="InPath"           value="${INPATH}" />
            <Var name="OutPath"          value="${OUTPATH}" />
            <Var name="KeepPublicApi"    value="false" />
            <Var name="HideStrings"      value="true"  />
            <Var name="RenameProperties" value="true"  />
            <Var name="RenameEvents"     value="true"  />
            <Var name="RenameFields"     value="true"  />
            <Module file="\${InPath}/Kei.Base.dll"            />
            <Module file="\${InPath}/Kei.Base.Domain.dll"     />
            <Module file="\${InPath}/Kei.Base.Helper.dll"     />
            <Module file="\${InPath}/Kei.Base.Extensions.dll" />
          </Obfuscator>
          EOF

          echo "📄 Generated obfuscator.xml:"
          cat obfuscator.xml

          echo "📂 Input DLLs:"
          ls -la "$INPATH" | grep "Kei.Base"

          obfuscar.console "$(pwd)/obfuscator.xml"

      # Step 8: Verify obfuscated output
      - name: Verify obfuscated output
        run: |
          echo "📂 Obfuscated DLLs:"
          ls -la confused/

      # Step 9: Replace DLLs with obfuscated versions
      - name: Replace DLLs with obfuscated versions
        run: |
          cp confused/Kei.Base.dll            Kei.Base/bin/Release/net8.0/
          cp confused/Kei.Base.Domain.dll     Kei.Base/bin/Release/net8.0/
          cp confused/Kei.Base.Helper.dll     Kei.Base/bin/Release/net8.0/
          cp confused/Kei.Base.Extensions.dll Kei.Base/bin/Release/net8.0/

      # Step 10: Pack all projects into NuGet packages
      - name: Pack NuGet packages
        run: |
          dotnet pack Kei.Base/Kei.Base.csproj                              -c Release -o ./artifacts
          dotnet pack Kei.Base.Domain/Kei.Base.Domain.csproj                -c Release -o ./artifacts
          dotnet pack Kei.Base.Extensions/Kei.Base.Extensions.csproj        -c Release -o ./artifacts
          dotnet pack Kei.Base.Helper/Kei.Base.Helper.csproj                -c Release -o ./artifacts

      # Step 11: Publish packages to NuGet (only on tagged commits or master)
      - name: Publish to NuGet
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "📦 Checking packed artifacts..."
          ls -R ./artifacts
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
