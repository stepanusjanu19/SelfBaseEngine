name: NuGet Publish

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'

jobs:
  build:
    # Windows runner: ConfuserEx runs on .NET Framework natively â€” no Mono, no registry errors,
    # and Windows assembly resolution handles ASP.NET Core + EF Core correctly.
    runs-on: windows-latest
    permissions:
      contents: write   # required for git push (version bump commit + tag)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed so git push back to master works

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Kei.Base/Kei.Base.sln

      - name: Build solution
        run: dotnet build Kei.Base/Kei.Base.sln --configuration Release --no-restore

      # Copy sibling DLLs into the Kei.Base output so ConfuserEx finds them in one baseDir
      - name: Copy project DLLs for obfuscation
        shell: pwsh
        run: |
          Copy-Item Kei.Base.Domain\bin\Release\net8.0\Kei.Base.Domain.dll       Kei.Base\bin\Release\net8.0\
          Copy-Item Kei.Base.Extensions\bin\Release\net8.0\Kei.Base.Extensions.dll Kei.Base\bin\Release\net8.0\
          Copy-Item Kei.Base.Helper\bin\Release\net8.0\Kei.Base.Helper.dll        Kei.Base\bin\Release\net8.0\

      # Download ConfuserEx CLI (runs on .NET Framework on Windows â€” no Mono needed)
      - name: Download ConfuserEx
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/mkaring/ConfuserEx/releases/download/v1.6.0/ConfuserEx-CLI.zip" -OutFile confuserex.zip
          Expand-Archive -Path confuserex.zip -DestinationPath confuserex -Force
          Write-Host "ConfuserEx contents:"
          Get-ChildItem confuserex

      # Generate confuser.crproj dynamically using actual Windows paths
      - name: Generate confuser.crproj
        shell: pwsh
        run: |
          $baseDir = "${{ github.workspace }}\Kei.Base\bin\Release\net8.0"
          $outDir  = "${{ github.workspace }}\confused"

          # Discover .NET 8 ASP.NET Core path for probe (Windows layout)
          $aspnetBase = "C:\Program Files\dotnet\shared\Microsoft.AspNetCore.App"
          $aspnetVer  = (Get-ChildItem $aspnetBase | Where-Object Name -Like "8.*" | Sort-Object Name -Descending | Select-Object -First 1).Name
          $aspnetPath = "$aspnetBase\$aspnetVer"

          $netcoreBase = "C:\Program Files\dotnet\shared\Microsoft.NETCore.App"
          $netcoreVer  = (Get-ChildItem $netcoreBase | Where-Object Name -Like "8.*" | Sort-Object Name -Descending | Select-Object -First 1).Name
          $netcorePath = "$netcoreBase\$netcoreVer"

          # Domain bin has EF Core 9.0.6; Helper bin has EF Core 8.x â€” both needed
          $domainBin = "${{ github.workspace }}\Kei.Base.Domain\bin\Release\net8.0"
          $helperBin = "${{ github.workspace }}\Kei.Base.Helper\bin\Release\net8.0"

          # NuGet cache fallback for EF Core 9.0.6
          $nugetPkgs  = if ($env:NUGET_PACKAGES) { $env:NUGET_PACKAGES } else { "$env:USERPROFILE\.nuget\packages" }
          $efCore9    = "$nugetPkgs\microsoft.entityframeworkcore\9.0.6\lib\net8.0"
          $efRelat9   = "$nugetPkgs\microsoft.entityframeworkcore.relational\9.0.6\lib\net8.0"

          Write-Host "baseDir:      $baseDir"
          Write-Host "outDir:       $outDir"
          Write-Host ".NET Core:    $netcorePath"
          Write-Host "ASP.NET Core: $aspnetPath"
          Write-Host "Domain bin:   $domainBin"
          Write-Host "EF Core 9:    $efCore9"

          $xml = @(
            "<?xml version=`"1.0`" encoding=`"utf-8`" ?>",
            "<project outputDir=`"$outDir`" baseDir=`"$baseDir`">",
            "  <rule pattern=`"true`" preset=`"maximum`" inherit=`"false`">",
            "    <protection id=`"rename`" />",
            "    <protection id=`"ctrl flow`" />",
            "    <protection id=`"resources`" />",
            "    <!-- constants removed: injects module initializer that causes TypeInitializationException on consumer load -->",
            "  </rule>",
            "  <module path=`"Kei.Base.dll`" />",
            "  <module path=`"Kei.Base.Domain.dll`" />",
            "  <module path=`"Kei.Base.Helper.dll`" />",
            "  <module path=`"Kei.Base.Extensions.dll`" />",
            "  <probePath>$netcorePath</probePath>",
            "  <probePath>$aspnetPath</probePath>",
            "  <probePath>$domainBin</probePath>",
            "  <probePath>$helperBin</probePath>",
            "  <probePath>$efCore9</probePath>",
            "  <probePath>$efRelat9</probePath>",
            "</project>"
          )
          $xml | Set-Content -Path confuser.crproj -Encoding UTF8
          Write-Host "=== confuser.crproj ==="
          Get-Content confuser.crproj

      # Run ConfuserEx via dotnet (Windows native â€” no Mono)
      - name: Obfuscate assemblies
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path confused | Out-Null
          
          # Run ConfuserEx directly â€” it's a .NET Framework exe, not a dotnet app
          .\confuserex\Confuser.CLI.exe -n confuser.crproj
          
          Write-Host "=== Obfuscated output ==="
          Get-ChildItem confused\

      # Replace originals with obfuscated DLLs
      - name: Replace DLLs with obfuscated versions
        shell: pwsh
        run: |
          Copy-Item confused\Kei.Base.dll            Kei.Base\bin\Release\net8.0\ -Force
          Copy-Item confused\Kei.Base.Domain.dll     Kei.Base.Domain\bin\Release\net8.0\ -Force
          Copy-Item confused\Kei.Base.Helper.dll     Kei.Base.Helper\bin\Release\net8.0\ -Force
          Copy-Item confused\Kei.Base.Extensions.dll Kei.Base.Extensions\bin\Release\net8.0\ -Force

      - name: Bump patch version
        shell: pwsh
        run: |
          # Read current version from Kei.Base.csproj and increment patch
          $content  = Get-Content Kei.Base\Kei.Base.csproj -Raw
          if ($content -match '<Version>(\d+)\.(\d+)\.(\d+)</Version>') {
            $major   = $matches[1]
            $minor   = $matches[2]
            $patch   = [int]$matches[3] + 1
            $newVer  = "$major.$minor.$patch"
          } else {
            $newVer = "1.0.1"
          }
          Write-Host "New version: $newVer"
          echo "PKG_VERSION=$newVer" >> $env:GITHUB_ENV

          # Apply to all project csproj files
          $projFiles = @(
            "Kei.Base\Kei.Base.csproj",
            "Kei.Base.Domain\Kei.Base.Domain.csproj",
            "Kei.Base.Extensions\Kei.Base.Extensions.csproj",
            "Kei.Base.Helper\Kei.Base.Helper.csproj"
          )
          foreach ($f in $projFiles) {
            (Get-Content $f -Raw) `
              -replace '<Version>\d+\.\d+\.\d+</Version>', "<Version>$newVer</Version>" |
              Set-Content $f
            Write-Host "Updated $f -> $newVer"
          }

      - name: Commit version bump
        shell: pwsh
        run: |
          $v = $env:PKG_VERSION
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage all updated csproj files
          git add Kei.Base\Kei.Base.csproj
          git add Kei.Base.Domain\Kei.Base.Domain.csproj
          git add Kei.Base.Extensions\Kei.Base.Extensions.csproj
          git add Kei.Base.Helper\Kei.Base.Helper.csproj

          # Commit and tag â€” skip if nothing changed (e.g. re-run on same commit)
          $status = git status --porcelain
          if ($status) {
            git commit -m "chore: bump version to $v [skip ci]"
            Write-Host "Committed version bump -> $v"
          } else {
            Write-Host "No csproj changes to commit (already up to date)"
          }

          # Create an annotated tag for this release
          git tag -a "v$v" -m "Release v$v" 2>$null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Tagged v$v"
          } else {
            Write-Host "Tag v$v already exists â€” skipping"
          }

          # Push commit + tag back to master
          git push origin HEAD:master --follow-tags
          Write-Host "Pushed v$v to master"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pack NuGet packages
        shell: pwsh
        run: |
          $v = $env:PKG_VERSION
          Write-Host "Packing version: $v"
          dotnet pack Kei.Base\Kei.Base.csproj               -c Release --no-build -o .\artifacts /p:Version=$v
          dotnet pack Kei.Base.Domain\Kei.Base.Domain.csproj  -c Release --no-build -o .\artifacts /p:Version=$v
          dotnet pack Kei.Base.Extensions\Kei.Base.Extensions.csproj -c Release --no-build -o .\artifacts /p:Version=$v
          dotnet pack Kei.Base.Helper\Kei.Base.Helper.csproj  -c Release --no-build -o .\artifacts /p:Version=$v

      - name: Publish to NuGet
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          Write-Host "Checking packed artifacts..."
          Get-ChildItem .\artifacts
          dotnet nuget push ".\artifacts\*.nupkg" `
            --api-key ${{ secrets.NUGET_API_KEY }} `
            --source https://api.nuget.org/v3/index.json `
            --skip-duplicate
