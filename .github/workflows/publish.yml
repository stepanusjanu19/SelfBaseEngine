name: NuGet Publish

on:
  push:
    branches:
      - master
    # Tags trigger intentionally removed — the workflow auto-creates tags during the
    # version-bump step. If we also triggered on tags, every auto-tag would start another
    # run, causing an infinite loop. Trigger on master push only.

jobs:
  build:
    # Windows runner: ConfuserEx runs on .NET Framework natively — no Mono, no registry errors,
    # and Windows assembly resolution handles ASP.NET Core + EF Core correctly.
    runs-on: windows-latest
    # Extra guard: skip if this run was triggered by the bot's own version-bump commit
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write   # required for git push (version bump commit + tag)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed so git push back to master works

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Kei.Base/Kei.Base.sln

      - name: Build solution
        run: dotnet build Kei.Base/Kei.Base.sln --configuration Release --no-restore


      # ────────────────────────────────────────────────────────
      # NOTE: ConfuserEx 1.6 obfuscation has been disabled.
      # It is fundamentally incompatible with .NET 8:
      #   - constants / resources / anti-*  → TypeInitializationException (.cctor injection)
      #   - rename                          → BadImageFormatException (invalid metadata)
      #   - ctrl flow                       → BadImageFormatException (enclosing type errors)
      # Consider migrating to a .NET 8-compatible obfuscator if obfuscation is required.
      # ────────────────────────────────────────────────────────

      - name: Bump patch version
        shell: pwsh
        run: |
          # Read current version from Kei.Base.csproj and increment patch
          $content  = Get-Content Kei.Base\Kei.Base.csproj -Raw
          if ($content -match '<Version>(\d+)\.(\d+)\.(\d+)</Version>') {
            $major   = $matches[1]
            $minor   = $matches[2]
            $patch   = [int]$matches[3] + 1
            $newVer  = "$major.$minor.$patch"
          } else {
            $newVer = "1.0.1"
          }
          Write-Host "New version: $newVer"
          echo "PKG_VERSION=$newVer" >> $env:GITHUB_ENV

          # Apply to all project csproj files
          $projFiles = @(
            "Kei.Base\Kei.Base.csproj",
            "Kei.Base.Domain\Kei.Base.Domain.csproj",
            "Kei.Base.Extensions\Kei.Base.Extensions.csproj",
            "Kei.Base.Helper\Kei.Base.Helper.csproj"
          )
          foreach ($f in $projFiles) {
            (Get-Content $f -Raw) `
              -replace '<Version>\d+\.\d+\.\d+</Version>', "<Version>$newVer</Version>" |
              Set-Content $f
            Write-Host "Updated $f -> $newVer"
          }

      - name: Commit version bump
        shell: pwsh
        run: |
          $v = $env:PKG_VERSION
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage all updated csproj files
          git add Kei.Base\Kei.Base.csproj
          git add Kei.Base.Domain\Kei.Base.Domain.csproj
          git add Kei.Base.Extensions\Kei.Base.Extensions.csproj
          git add Kei.Base.Helper\Kei.Base.Helper.csproj

          # Commit and tag — skip if nothing changed (e.g. re-run on same commit)
          $status = git status --porcelain
          if ($status) {
            git commit -m "chore: bump version to $v"
            Write-Host "Committed version bump -> $v"
          } else {
            Write-Host "No csproj changes to commit (already up to date)"
          }

          # Create an annotated tag for this release
          git tag -a "v$v" -m "Release v$v" 2>$null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Tagged v$v"
          } else {
            Write-Host "Tag v$v already exists — skipping"
          }

          # Push commit + tag back to master
          git push origin HEAD:master --follow-tags
          Write-Host "Pushed v$v to master"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pack NuGet packages
        shell: pwsh
        run: |
          $v = $env:PKG_VERSION
          Write-Host "Packing version: $v"
          dotnet pack Kei.Base\Kei.Base.csproj               -c Release --no-build -o .\artifacts /p:Version=$v
          dotnet pack Kei.Base.Domain\Kei.Base.Domain.csproj  -c Release --no-build -o .\artifacts /p:Version=$v
          dotnet pack Kei.Base.Extensions\Kei.Base.Extensions.csproj -c Release --no-build -o .\artifacts /p:Version=$v
          dotnet pack Kei.Base.Helper\Kei.Base.Helper.csproj  -c Release --no-build -o .\artifacts /p:Version=$v

      - name: Publish to NuGet
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          Write-Host "Checking packed artifacts..."
          Get-ChildItem .\artifacts
          dotnet nuget push ".\artifacts\*.nupkg" `
            --api-key ${{ secrets.NUGET_API_KEY }} `
            --source https://api.nuget.org/v3/index.json `
            --skip-duplicate
