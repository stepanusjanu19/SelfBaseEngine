name: NuGet Publish

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*' # Runs when you push a tag like v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Setup .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Step 3: Restore dependencies
      - name: Restore dependencies
        run: dotnet restore Kei.Base/Kei.Base.sln

      # Step 4: Build solution (all 4 projects)
      - name: Build solution
        run: dotnet build Kei.Base/Kei.Base.sln --configuration Release --no-restore

      # Step 5: Install Obfuscar
      - name: Install Obfuscar
        run: dotnet tool install --global Obfuscar.GlobalTool

      # Step 6: Self-contained publish Kei.Base.Helper (it has the widest dependency surface —
      #   ASP.NET Core + EF Core 8 + EF Core 9 via Domain). Publishing self-contained copies
      #   ALL framework DLLs (including Microsoft.AspNetCore.Mvc.Core) into one flat directory,
      #   solving Obfuscar's InheritMap assembly resolution issue.
      - name: Self-contained publish for framework deps
        run: |
          dotnet publish Kei.Base.Helper/Kei.Base.Helper.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained true \
            --output sc_publish \
            --no-restore

          echo "📂 sc_publish DLL count: $(ls sc_publish/*.dll | wc -l)"

      # Step 7: Overlay the freshly-built project DLLs into sc_publish so Obfuscar obfuscates
      #   the correct (just-built) versions, not whatever publish produced.
      - name: Overlay project DLLs into publish dir
        run: |
          cp Kei.Base/bin/Release/net8.0/Kei.Base.dll                        sc_publish/
          cp Kei.Base.Domain/bin/Release/net8.0/Kei.Base.Domain.dll          sc_publish/
          cp Kei.Base.Helper/bin/Release/net8.0/Kei.Base.Helper.dll          sc_publish/
          cp Kei.Base.Extensions/bin/Release/net8.0/Kei.Base.Extensions.dll  sc_publish/

          echo "✅ Overlaid project DLLs. Total DLLs: $(ls sc_publish/*.dll | wc -l)"

      # Step 8: Obfuscate the 4 project DLLs using sc_publish as InPath so ALL framework
      #   assemblies (ASP.NET Core, .NET Core, EF Core 9) are resolvable.
      - name: Obfuscate assemblies
        run: |
          mkdir -p confused

          INPATH="$(pwd)/sc_publish"
          OUTPATH="$(pwd)/confused"

          cat > obfuscator.xml <<EOF
          <?xml version='1.0'?>
          <Obfuscator>
            <Var name="OutPath"          value="${OUTPATH}" />
            <Var name="KeepPublicApi"    value="false" />
            <Var name="HideStrings"      value="true"  />
            <Var name="RenameProperties" value="true"  />
            <Var name="RenameEvents"     value="true"  />
            <Var name="RenameFields"     value="true"  />
            <Module file="${INPATH}/Kei.Base.dll"            />
            <Module file="${INPATH}/Kei.Base.Domain.dll"     />
            <Module file="${INPATH}/Kei.Base.Helper.dll"     />
            <Module file="${INPATH}/Kei.Base.Extensions.dll" />
          </Obfuscator>
          EOF

          echo "📄 Generated obfuscator.xml:"
          cat obfuscator.xml

          obfuscar.console "$(pwd)/obfuscator.xml"

      # Step 9: Verify obfuscated output
      - name: Verify obfuscated output
        run: |
          echo "📂 Obfuscated DLLs:"
          ls -la confused/*.dll

      # Step 10: Copy obfuscated DLLs back to each project's bin dir for nuget pack
      - name: Replace DLLs with obfuscated versions
        run: |
          cp confused/Kei.Base.dll            Kei.Base/bin/Release/net8.0/
          cp confused/Kei.Base.Domain.dll     Kei.Base.Domain/bin/Release/net8.0/
          cp confused/Kei.Base.Helper.dll     Kei.Base.Helper/bin/Release/net8.0/
          cp confused/Kei.Base.Extensions.dll Kei.Base.Extensions/bin/Release/net8.0/

      # Step 11: Pack all projects into NuGet packages
      - name: Pack NuGet packages
        run: |
          dotnet pack Kei.Base/Kei.Base.csproj                              -c Release --no-build -o ./artifacts
          dotnet pack Kei.Base.Domain/Kei.Base.Domain.csproj                -c Release --no-build -o ./artifacts
          dotnet pack Kei.Base.Extensions/Kei.Base.Extensions.csproj        -c Release --no-build -o ./artifacts
          dotnet pack Kei.Base.Helper/Kei.Base.Helper.csproj                -c Release --no-build -o ./artifacts

      # Step 12: Publish packages to NuGet (only on tagged commits or master)
      - name: Publish to NuGet
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "📦 Checking packed artifacts..."
          ls -R ./artifacts
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
